<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  color: white;
  overflow-x: hidden;
  min-height: 100vh;
  background: linear-gradient(135deg, #061a3a, #0b3d91);
}

/* 🌌 subtle floating stars */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.15;
  animation: float 25s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* Center top icon */
.logo {
  position: absolute;
  top: 6%;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffffff, #4aa3ff);
  box-shadow: 0 0 25px rgba(74,163,255,0.4);
  z-index: 2;
}

/* Hero */
.hero {
  height: 85vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  z-index: 2;
}

.hero h1 {
  font-size: 70px;
  background: linear-gradient(90deg, #00f5ff, #a855f7);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  margin-top: 15px;
  color: #ccc;
}

/* Buttons */
.downloads {
  margin-top: 40px;
  display: flex;
  gap: 20px;
}

.btn {
  padding: 15px 35px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  color: white;
  text-decoration: none;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(124,58,237,0.7);
}

.features {
  padding: 80px 20px;
  text-align: center;
  position: relative;
  z-index: 2;
}

.feature-grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

footer {
  padding: 20px;
  text-align: center;
  color: #aaa;
}
</style>
</head>

<body>

<!-- stars -->
<div class="stars">
  <div class="star" style="left:10%; animation-duration:22s;"></div>
  <div class="star" style="left:20%; animation-duration:18s;"></div>
  <div class="star" style="left:30%; animation-duration:28s;"></div>
  <div class="star" style="left:40%; animation-duration:24s;"></div>
  <div class="star" style="left:50%; animation-duration:30s;"></div>
  <div class="star" style="left:60%; animation-duration:26s;"></div>
  <div class="star" style="left:70%; animation-duration:20s;"></div>
  <div class="star" style="left:80%; animation-duration:27s;"></div>
  <div class="star" style="left:90%; animation-duration:23s;"></div>
</div>

<!-- new icon (center top) -->
<div class="logo"></div>

<section class="hero">
  <h1>NEBULA</h1>
  <p>The next-generation Minecraft launcher.</p>

  <div class="downloads">
    <a href="downloads/NebulaSetup.exe" class="btn">Download for Windows</a>
  </div>
</section>

<section class="features">
  <h2>Why Nebula?</h2>

  <div class="feature-grid">
    <div class="card">
      <h3>⚡ High FPS</h3>
      <p>Boost your performance and reduce lag.</p>
    </div>
    <div class="card">
      <h3>🎮 Built-in Mods</h3>
      <p>All essential mods included.</p>
    </div>
    <div class="card">
      <h3>🎨 Clean UI</h3>
      <p>Modern and simple interface.</p>
    </div>
    <div class="card">
      <h3>🔒 Secure</h3>
      <p>Safe and regularly updated.</p>
    </div>
  </div>
</section>

<footer>
© 2026 Nebula Launcher
</footer>

</body>
</html>
