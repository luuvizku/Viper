<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nebula Client</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a0033, #000000);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 60px;
      margin-top: 150px;
      background: linear-gradient(90deg, #a855f7, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 20px;
      color: #ccc;
    }

    .btn {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #7c3aed, #4f46e5);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #7c3aed;
    }

    /* Stars */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    .stars span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      animation: move 10s linear infinite;
    }

    @keyframes move {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(100vh);
      }
    }
  </style>
</head>
<body>

<div class="stars">
  <!-- tähdet -->
  <span style="left:10%; animation-delay:0s;"></span>
  <span style="left:20%; animation-delay:2s;"></span>
  <span style="left:30%; animation-delay:4s;"></span>
  <span style="left:40%; animation-delay:1s;"></span>
  <span style="left:50%; animation-delay:3s;"></span>
  <span style="left:60%; animation-delay:5s;"></span>
  <span style="left:70%; animation-delay:2s;"></span>
  <span style="left:80%; animation-delay:6s;"></span>
  <span style="left:90%; animation-delay:1s;"></span>
</div>

<h1>🌌 Nebula Client</h1>
<p>The next-generation Minecraft experience</p>

<button class="btn">Download</button>

</body>
</html>
