<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  color:white;
  min-height:100vh;
  overflow-x:hidden;
  background: linear-gradient(180deg, #050b1a, #0b2a55);
}

/* very subtle stars (reduced clutter) */
.stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.08;
}

/* simple minecraft-like cube logo */
.logo{
  position:absolute;
  top:6%;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:2px;
  z-index:2;
}

.logo div{
  background: linear-gradient(145deg, #4aa3ff, #1b6cff);
  border-radius:2px;
  box-shadow:0 0 6px rgba(74,163,255,0.4);
}

.hero{
  height:85vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  z-index:2;
}

.hero h1{
  font-size:64px;
  color:#7cc7ff;
}

.hero p{
  margin-top:12px;
  color:#cfd8e3;
}

.downloads{
  margin-top:35px;
}

.btn{
  padding:14px 30px;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  color:white;
  text-decoration:none;
  backdrop-filter:blur(8px);
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(74,163,255,0.5);
}

.features{
  padding:60px 20px;
  text-align:center;
  position:relative;
  z-index:2;
}

.feature-grid{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.04);
  padding:20px;
  border-radius:12px;
}

footer{
  text-align:center;
  padding:20px;
  color:#7a8aa0;
}
</style>
</head>

<body>

<!-- minimal stars -->
<div class="stars">
  <div class="star" style="top:10%;left:15%"></div>
  <div class="star" style="top:25%;left:70%"></div>
  <div class="star" style="top:40%;left:30%"></div>
  <div class="star" style="top:60%;left:80%"></div>
  <div class="star" style="top:75%;left:50%"></div>
</div>

<!-- minecraft-style cube logo -->
<div class="logo">
  <div></div><div></div><div></div>
  <div></div><div></div><div></div>
  <div></div><div></div><div></div>
</div>

<section class="hero">
  <h1>NEBULA</h1>
  <p>The next-generation Minecraft launcher.</p>

  <div class="downloads">
    <a href="downloads/NebulaSetup.exe" class="btn">Download for Windows</a>
  </div>
</section>

<section class="features">
  <h2>Why Nebula?</h2>

  <div class="feature-grid">
    <div class="card">
      <h3>High FPS</h3>
      <p>Better performance and smoother gameplay.</p>
    </div>
    <div class="card">
      <h3>Built-in Mods</h3>
      <p>Essential tools included.</p>
    </div>
    <div class="card">
      <h3>Clean UI</h3>
      <p>Simple and modern design.</p>
    </div>
    <div class="card">
      <h3>Secure</h3>
      <p>Safe updates and protection.</p>
    </div>
  </div>
</section>

<footer>
© 2026 Nebula Launcher
</footer>

</body>
</html>
