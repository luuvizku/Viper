<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:linear-gradient(135deg,#1a1140,#050816);
  color:white;
  text-align:center;
  overflow:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* 🔥 BIG PREMIUM LOGO */
.logo{
  width:120px;
  height:120px;
  border-radius:50%;
  background:conic-gradient(#7c7cff,#a855f7,#22d3ee,#7c7cff);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
  animation:spin 6s linear infinite;
  box-shadow:0 0 40px rgba(120,80,255,0.8);
}

.logo::after{
  content:"";
  width:70px;
  height:70px;
  background:#050816;
  border-radius:50%;
  box-shadow:0 0 25px rgba(0,200,255,0.7) inset;
}

/* TEXT */
h1{
  font-size:70px;
  background:linear-gradient(90deg,#7cc7ff,#c084ff,#5eead4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 30px;
  border-radius:14px;
  text-decoration:none;
  color:white;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}

.btn:hover{
  box-shadow:0 0 25px rgba(120,80,255,0.7);
}

/* ⬇️ BIG ARROW */
.arrow{
  position:absolute;
  bottom:40px;
  font-size:40px;
  animation:bounce 1.5s infinite;
  color:#7dd3fc;
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(15px);}
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="hero">

  <div class="logo"></div>

  <h1>NEBULA</h1>

  <a href="#" class="btn">Download for Windows</a>

  <!-- ⬇️ VERY VISIBLE -->
  <div class="arrow">↓</div>

</div>

</body>
</html>
