<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nebula Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  color:white;
  background:#050816;
  position:relative;
}

/* ===== Nebula background ===== */
.nebula{
  position:fixed;
  inset:-200px;
  background:
    radial-gradient(circle at 20% 30%, rgba(120,80,255,0.35), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(0,200,255,0.25), transparent 45%),
    radial-gradient(circle at 50% 20%, rgba(255,100,200,0.18), transparent 40%);
  filter: blur(40px);
  animation: floatNebula 12s ease-in-out infinite alternate;
  z-index:0;
}

@keyframes floatNebula{
  0%{ transform: translate3d(0,0,0) scale(1); }
  100%{ transform: translate3d(30px,-20px,0) scale(1.05); }
}

/* ===== Stars ===== */
.stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:0.6;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
  0%,100%{ opacity:0.2; transform:scale(1); }
  50%{ opacity:1; transform:scale(1.6); }
}

/* ===== Layout ===== */
.hero{
  position:relative;
  z-index:2;
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  font-size:72px;
  letter-spacing:4px;
  background: linear-gradient(90deg,#7cc7ff,#c084ff,#5eead4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  margin-top:12px;
  color:#cbd5e1;
}

/* ===== Windows Button ===== */
.downloads{
  margin-top:35px;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:12px;
  padding:14px 26px;
  border-radius:14px;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  transition:0.25s;
  position:relative;
  overflow:hidden;
}

.btn::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(90deg,#4aa3ff,#a855f7,#22d3ee);
  opacity:0;
  transition:0.25s;
  filter:blur(10px);
  z-index:-1;
}

.btn:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 0 25px rgba(100,150,255,0.4);
}

.btn:hover::before{
  opacity:0.8;
}

/* Windows icon */
.win-icon{
  width:18px;
  height:18px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:2px;
}

.win-icon div{
  background:white;
  opacity:0.9;
}

/* ===== Features ===== */
.features{
  position:relative;
  z-index:2;
  padding:60px 20px;
  text-align:center;
}

.feature-grid{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  padding:20px;
  border-radius:16px;
  backdrop-filter: blur(10px);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 20px rgba(120,120,255,0.2);
}

footer{
  text-align:center;
  padding:20px;
  color:#94a3b8;
  position:relative;
  z-index:2;
}
</style>
</head>

<body>

<div class="nebula"></div>

<div class="stars" id="stars"></div>

<section class="hero">
  <h1>NEBULA</h1>
  <p>The next-generation Minecraft launcher.</p>

  <div class="downloads">
    <a href="downloads/NebulaSetup.exe" class="btn">
      <div class="win-icon">
        <div></div><div></div><div></div><div></div>
      </div>
      Download for Windows
    </a>
  </div>
</section>

<section class="features">
  <h2>Why Nebula?</h2>
  <div class="feature-grid">
    <div class="card"><h3>High FPS</h3><p>Smoother gameplay.</p></div>
    <div class="card"><h3>Mods</h3><p>Built-in essentials.</p></div>
    <div class="card"><h3>Clean UI</h3><p>Modern design.</p></div>
    <div class="card"><h3>Secure</h3><p>Safe updates.</p></div>
  </div>
</section>

<footer>© 2026 Nebula Launcher</footer>

<script>
// generate floating stars
const stars = document.getElementById('stars');

for(let i=0;i<60;i++){
  const s = document.createElement('div');
  s.className='star';
  s.style.top=Math.random()*100+'%';
  s.style.left=Math.random()*100+'%';
  s.style.animationDuration=(2+Math.random()*3)+'s';
  s.style.opacity=Math.random();
  stars.appendChild(s);
}
</script>

</body>
</html>
